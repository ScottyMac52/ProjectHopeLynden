name: Issue 79 Build Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/issue-79-build-diagnostics.yml'
      - 'src/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  diagnose-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Capture build diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          dotnet restore ProjectHopeLynden.sln *> restore-output.txt
          dotnet build ProjectHopeLynden.sln --no-restore -c Release *> build-output.txt
          Write-Host "Build exit code: $LASTEXITCODE"
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-79-build-diagnostics
          path: |
            restore-output.txt
            build-output.txt
          if-no-files-found: error
