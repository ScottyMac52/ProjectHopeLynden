name: Diagnose issue 44 build

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: read

jobs:
  capture-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        shell: pwsh
        run: dotnet restore ProjectHopeLynden.sln
      - name: Capture build and test output
        shell: pwsh
        continue-on-error: true
        run: |
          dotnet build ProjectHopeLynden.sln --no-restore *> diagnostics.log
          $buildExitCode = $LASTEXITCODE
          Add-Content diagnostics.log "BUILD_EXIT_CODE=$buildExitCode"

          if ($buildExitCode -eq 0) {
            dotnet test ProjectHopeLynden.sln --no-build --no-restore *>> diagnostics.log
            $testExitCode = $LASTEXITCODE
            Add-Content diagnostics.log "TEST_EXIT_CODE=$testExitCode"
          }

          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: issue-44-diagnostic-log
          path: diagnostics.log
          if-no-files-found: error
