name: Issue 68 Test Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/issue-68-test-diagnostics.yml'

permissions:
  contents: read

jobs:
  diagnose-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build
        shell: pwsh
        run: |
          dotnet restore ProjectHopeLynden.sln
          dotnet build ProjectHopeLynden.sln --no-restore -c Release

      - name: Capture test diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          dotnet test ProjectHopeLynden.sln --no-build -c Release --logger 'trx;LogFileName=issue-68.trx'
          Write-Host "Test exit code: $LASTEXITCODE"
          exit 0

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-68-test-diagnostics
          path: '**/TestResults/issue-68.trx'
          if-no-files-found: error
