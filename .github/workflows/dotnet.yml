name: CI / Build / Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

  push:
    branches:
      - main
    tags:
      - 'v*.*.*.*'
    paths-ignore:
      - '**/*.md'

  workflow_dispatch:

jobs:
  ci:
    name: CI (Tests + Coverage)
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: false
      ci_mode: true
      create_release: false
      enable_installer: false
      skip_projects: ''
    secrets: inherit

  build-on-main:
    name: Build on Main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: false
      ci_mode: false
      create_release: false
      enable_installer: false
      skip_projects: ''
    secrets: inherit

  release:
    name: Full Build + Release (Tag only)
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: true
      ci_mode: false
      create_release: true
      enable_installer: true
      installer_iss_path: 'installer/installer.iss'
      app_publisher: 'Project Hope Food Bank of Lynden'
      skip_projects: ''
    secrets: inherit
