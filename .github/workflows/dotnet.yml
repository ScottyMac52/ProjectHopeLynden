name: CI / Build / Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

  push:
    branches:
      - main
    tags:
      - 'v*.*.*.*'
    paths-ignore:
      - '**/*.md'

  workflow_dispatch:

jobs:
  ci:
    name: CI (Tests + Coverage)
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: false
      ci_mode: true
      create_release: false
      enable_installer: false
      skip_projects: ''
    secrets: inherit

  coverage-threshold:
    name: Coverage Gate (80% line / 80% branch)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore ProjectHopeLynden.sln

      - name: Build
        shell: pwsh
        run: dotnet build ProjectHopeLynden.sln --no-restore -c Release

      - name: Run test projects with coverage
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $testProjects = @(Get-ChildItem -Path . -Recurse -Filter *.csproj -File |
            Where-Object {
              $_.FullName -notmatch '\\bin\\' -and
              $_.FullName -notmatch '\\obj\\'
            } |
            ForEach-Object {
              $content = Get-Content $_.FullName -Raw

              if (
                $content -match '<IsTestProject>\s*true\s*</IsTestProject>' -or
                $content -match 'Microsoft\.NET\.Test\.Sdk' -or
                $_.BaseName -match '(?i)(test|tests)$'
              ) {
                $_
              }
            })

          if ($testProjects.Count -eq 0) {
            throw "No test projects were found."
          }

          foreach ($testProject in $testProjects) {
            $testProjectPath = Resolve-Path $testProject.FullName -Relative
            $testProjectPath = $testProjectPath.TrimStart('.\')

            Write-Host "Running tests for $testProjectPath"

            dotnet test "$testProjectPath" `
              --no-build `
              -c Release `
              --collect:"XPlat Code Coverage" `
              --settings coverlet.runsettings `
              --results-directory ./coverage `
              --logger "console;verbosity=normal"

            if ($LASTEXITCODE -ne 0) {
              throw "Tests failed for $testProjectPath"
            }
          }

      - name: Install ReportGenerator
        shell: pwsh
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate merged Cobertura report
        shell: pwsh
        run: |
          reportgenerator -reports:./coverage/**/coverage.cobertura.xml `
                          -targetdir:./coverage/report `
                          -reporttypes:"Cobertura;MarkdownSummaryGithub" `
                          -filefilters:"-*/Persistence/Migrations/*;-*\Persistence\Migrations\*;-*/Program.cs;-*\Program.cs;-*/Startup/DatabaseInitializationExtensions.cs;-*\Startup\DatabaseInitializationExtensions.cs;-*/Pages/*.cshtml;-*\Pages\*.cshtml"

      - name: Assert coverage thresholds
        shell: pwsh
        run: |
          ./build/Assert-CoverageThreshold.ps1 `
            -CoverageFile ./coverage/report/Cobertura.xml `
            -LineThreshold 80 `
            -BranchThreshold 80

      - name: Publish coverage gate summary
        if: always()
        shell: pwsh
        run: |
          "## Coverage Gate" >> $env:GITHUB_STEP_SUMMARY
          if (Test-Path ./coverage/report/SummaryGithub.md) {
            Get-Content ./coverage/report/SummaryGithub.md >> $env:GITHUB_STEP_SUMMARY
          } else {
            "No coverage summary was generated." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload coverage gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gate-report
          path: ./coverage/report

  build-on-main:
    name: Build on Main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: false
      ci_mode: false
      create_release: false
      enable_installer: false
      skip_projects: ''
    secrets: inherit

  release:
    name: Full Build + Release (Tag only)
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: true
      ci_mode: false
      create_release: true
      enable_installer: true
      installer_iss_path: 'installer/installer.iss'
      app_publisher: 'Vyper Industries'
      skip_projects: ''
    secrets: inherit

  sign-installer:
    name: Azure Artifact Sign setup.exe (optional)
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      actions: read
      contents: write
      id-token: write

    steps:
      - name: Determine Azure Artifact Signing configuration
        id: signing
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SIGNING_ENDPOINT: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          SIGNING_ACCOUNT_NAME: ${{ vars.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          CERTIFICATE_PROFILE_NAME: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $configuration = [ordered]@{
            AZURE_CLIENT_ID = $env:AZURE_CLIENT_ID
            AZURE_TENANT_ID = $env:AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID = $env:AZURE_SUBSCRIPTION_ID
            ARTIFACT_SIGNING_ENDPOINT = $env:SIGNING_ENDPOINT
            ARTIFACT_SIGNING_ACCOUNT_NAME = $env:SIGNING_ACCOUNT_NAME
            ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME = $env:CERTIFICATE_PROFILE_NAME
          }

          $configuredNames = @($configuration.Keys | Where-Object {
            -not [string]::IsNullOrWhiteSpace($configuration[$_])
          })

          if ($configuredNames.Count -eq 0) {
            "enabled=false" >> $env:GITHUB_OUTPUT
            "## Azure Artifact Signing" >> $env:GITHUB_STEP_SUMMARY
            "Azure Artifact Signing is not configured. The unsigned installer from the shared release workflow remains available." >> $env:GITHUB_STEP_SUMMARY
            Write-Warning "Azure Artifact Signing skipped because no signing configuration is present."
            exit 0
          }

          $missingNames = @($configuration.Keys | Where-Object {
            [string]::IsNullOrWhiteSpace($configuration[$_])
          })

          if ($missingNames.Count -gt 0) {
            throw "Azure Artifact Signing is partially configured. Missing: $($missingNames -join ', '). Configure every required secret and variable, or remove all signing configuration to keep unsigned releases enabled."
          }

          "enabled=true" >> $env:GITHUB_OUTPUT
          Write-Host "Azure Artifact Signing configuration is complete."

      - name: Download unsigned release artifact
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: '*-build-v*'
          path: release-artifact
          merge-multiple: true

      - name: Stage installer for signing
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $setupFiles = @(Get-ChildItem -Path ./release-artifact -Recurse -Filter setup.exe -File)

          if ($setupFiles.Count -ne 1) {
            throw "Expected exactly one setup.exe in the release artifact, but found $($setupFiles.Count)."
          }

          New-Item -ItemType Directory -Path ./signed-installer -Force | Out-Null
          $target = Join-Path (Resolve-Path ./signed-installer).Path "setup.exe"
          Copy-Item -LiteralPath $setupFiles[0].FullName -Destination $target -Force
          "SETUP_PATH=$target" >> $env:GITHUB_ENV

      - name: Sign in to Azure with GitHub OIDC
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign setup.exe with Azure Artifact Signing
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ github.workspace }}\signed-installer\setup.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Project Hope Lynden Server Installer
          description-url: https://github.com/ScottyMac52/ProjectHopeLynden

      - name: Verify signed installer
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature -LiteralPath $env:SETUP_PATH

          if ($signature.Status -ne "Valid") {
            throw "The signed installer failed Authenticode verification. Status: $($signature.Status). $($signature.StatusMessage)"
          }

          "## Azure Artifact Signing" >> $env:GITHUB_STEP_SUMMARY
          "Signed and verified setup.exe." >> $env:GITHUB_STEP_SUMMARY
          "Certificate subject: $($signature.SignerCertificate.Subject)" >> $env:GITHUB_STEP_SUMMARY
          "Certificate thumbprint: $($signature.SignerCertificate.Thumbprint)" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload signed installer artifact
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ProjectHopeLynden-signed-installer-${{ github.ref_name }}
          path: ./signed-installer/setup.exe
          retention-days: 30
          if-no-files-found: error

      - name: Replace release asset with signed installer
        if: steps.signing.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./signed-installer/setup.exe
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Sign out of Azure
        if: always() && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: az logout
