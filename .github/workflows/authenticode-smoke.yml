name: Authenticode Signing Smoke Test

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths:
      - 'build/Sign-Authenticode.ps1'
      - '.github/workflows/dotnet.yml'
      - '.github/workflows/authenticode-smoke.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  sign-and-verify:
    name: Sign disposable Windows executable
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build disposable Windows executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $projectFolder = Join-Path $env:RUNNER_TEMP "ProjectHopeAuthenticodeSmoke"
          $publishFolder = Join-Path $projectFolder "publish"

          dotnet new console `
            --name AuthenticodeSmoke `
            --output $projectFolder `
            --framework net10.0 `
            --force

          dotnet publish (Join-Path $projectFolder "AuthenticodeSmoke.csproj") `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o $publishFolder

          $executablePath = Join-Path $publishFolder "AuthenticodeSmoke.exe"
          if (-not (Test-Path -LiteralPath $executablePath -PathType Leaf)) {
            throw "Disposable executable was not created at $executablePath."
          }

          "SMOKE_EXE=$executablePath" >> $env:GITHUB_ENV

      - name: Generate ephemeral certificate, sign, and verify
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $thumbprint = $null
          $certificatePath = Join-Path $env:RUNNER_TEMP "ProjectHopeAuthenticodeSmoke.cer"
          $pfxPath = Join-Path $env:RUNNER_TEMP "ProjectHopeAuthenticodeSmoke.pfx"
          $passwordText = "ProjectHope-CI-$([Guid]::NewGuid().ToString('N'))"
          $securePassword = ConvertTo-SecureString $passwordText -AsPlainText -Force

          try {
            $certificate = New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject "CN=Project Hope CI Authenticode Smoke Test" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -KeyExportPolicy Exportable `
              -NotAfter (Get-Date).AddDays(1)

            $thumbprint = $certificate.Thumbprint

            Export-Certificate `
              -Cert $certificate `
              -FilePath $certificatePath `
              -Force | Out-Null

            Import-Certificate `
              -FilePath $certificatePath `
              -CertStoreLocation "Cert:\CurrentUser\Root" | Out-Null

            Import-Certificate `
              -FilePath $certificatePath `
              -CertStoreLocation "Cert:\CurrentUser\TrustedPublisher" | Out-Null

            Export-PfxCertificate `
              -Cert $certificate `
              -FilePath $pfxPath `
              -Password $securePassword `
              -Force | Out-Null

            $certificateBase64 = [Convert]::ToBase64String([IO.File]::ReadAllBytes($pfxPath))

            ./build/Sign-Authenticode.ps1 `
              -FilePath $env:SMOKE_EXE `
              -CertificateBase64 $certificateBase64 `
              -CertificatePassword $passwordText `
              -SkipTimestamp

            $signature = Get-AuthenticodeSignature -LiteralPath $env:SMOKE_EXE
            if ($signature.Status -ne "Valid") {
              throw "Smoke-test signature status was '$($signature.Status)': $($signature.StatusMessage)"
            }

            Write-Host "Ephemeral Authenticode smoke test passed."
          } finally {
            if ($thumbprint) {
              foreach ($storeName in @("My", "Root", "TrustedPublisher")) {
                $storePath = "Cert:\CurrentUser\$storeName\$thumbprint"
                if (Test-Path -LiteralPath $storePath) {
                  Remove-Item -LiteralPath $storePath -Force -ErrorAction SilentlyContinue
                }
              }
            }

            Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $pfxPath -Force -ErrorAction SilentlyContinue
          }
