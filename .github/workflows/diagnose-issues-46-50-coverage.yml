name: Diagnose issues 46 through 50 coverage

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: read

jobs:
  diagnose-coverage:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore and build
        shell: pwsh
        run: |
          dotnet restore ProjectHopeLynden.sln
          dotnet build ProjectHopeLynden.sln --no-restore
      - name: Capture per-project coverage test output
        shell: pwsh
        continue-on-error: true
        run: |
          $log = "coverage-diagnostics.log"
          $projects = Get-ChildItem tests -Recurse -Filter *.csproj | Sort-Object FullName
          foreach ($project in $projects) {
            Add-Content $log "=== $($project.FullName) ==="
            dotnet test $project.FullName --no-build --no-restore --collect:"XPlat Code Coverage" --results-directory "TestResults/$($project.BaseName)" *>> $log
            Add-Content $log "EXIT_CODE=$LASTEXITCODE"
          }
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: issues-46-50-coverage-diagnostics
          path: coverage-diagnostics.log
          if-no-files-found: error
