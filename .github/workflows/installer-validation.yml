name: Installer Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/installer-validation.yml'
      - 'installer/**'

permissions:
  contents: read

jobs:
  compile-installer:
    name: Compile Inno Setup script
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Prepare placeholder publish directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path publish -Force | Out-Null
          Set-Content -Path publish/ProjectHopeLynden.Web.exe `
            -Value 'installer validation placeholder'

      - name: Validate Incoming Orders feature configuration
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $configPath = Join-Path $env:RUNNER_TEMP 'project-hope-appsettings.json'
          @'
          {
            "Urls": "http://*:5000",
            "Features": {
              "IncomingOrders": false
            }
          }
          '@ | Set-Content -LiteralPath $configPath -Encoding UTF8

          ./installer/ProjectHopeService.ps1 `
            -Action Configure `
            -ServiceName ProjectHopeLynden `
            -ConfigPath $configPath `
            -IncomingOrdersEnabled true

          $enabled = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
          if (-not $enabled.Features.IncomingOrders) {
            throw 'The installer helper did not enable Incoming Orders.'
          }
          if ($enabled.Urls -ne 'http://*:5000') {
            throw 'The installer helper changed an unrelated setting.'
          }

          ./installer/ProjectHopeService.ps1 `
            -Action Configure `
            -ServiceName ProjectHopeLynden `
            -ConfigPath $configPath `
            -IncomingOrdersEnabled false

          $disabled = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
          if ($disabled.Features.IncomingOrders) {
            throw 'The installer helper did not disable Incoming Orders.'
          }

      - name: Compile installer script
        shell: pwsh
        run: |
          $publishDir = (Resolve-Path ./publish).Path
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            "/DPublishDir=$publishDir" `
            installer/installer.iss
